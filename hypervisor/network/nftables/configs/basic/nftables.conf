#!/usr/sbin/nft -f

# 1. Flush the current ruleset. 
# This is the magic IaC line that ensures an atomic reload every time.
flush ruleset

# 2. Create a single table called 'filter' in the 'inet' family.
# 'inet' means it applies to BOTH IPv4 and IPv6 simultaneously.
table inet filter {

    # 3. The INPUT chain (Traffic destined FOR your server)
    chain input {
        # Set default policy to DROP. If a rule doesn't explicitly allow it, kill it.
        type filter hook input priority filter; policy drop;

        # Allow trusted loopback traffic (internal server processes talking to each other)
        iif "lo" accept

        # ANTI-LOCKOUT RULE: Allow traffic from established and related connections.
        # This keeps your current SSH session alive.
        ct state established,related accept

        # Allow invalid packets to be dropped immediately (security best practice)
        ct state invalid drop

        # Allow ICMP (Ping) so you can test if the server is online
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Allow SSH (Port 22)
        tcp dport 22 accept
        
        # Notice: Port 9090 (Cockpit) is NOT listed here. 
        # Because the policy is 'drop', it is now effectively closed.
    }

    # 4. The FORWARD chain (Traffic passing THROUGH your server)
    chain forward {
        # We are not acting as a router right now, so drop everything.
        type filter hook forward priority filter; policy drop;
    }

    # 5. The OUTPUT chain (Traffic LEAVING your server)
    chain output {
        # Let the server talk to the outside world freely (for now)
        type filter hook output priority filter; policy accept;
    }
}